name: Docker build (reusable)

on:
  workflow_call:
    inputs:
      push:
        description: Push images to GHCR
        type: boolean
        required: true
      version:
        description: Release version for image tags (e.g. 0.2.0); omit on preview builds
        type: string
        required: false
        default: ""
      publish_latest:
        description: Also tag images as latest-<variant>
        type: boolean
        required: false
        default: false
      pr_number:
        description: Pull request number for preview cache scope
        type: string
        required: false
        default: ""
      ref:
        description: Git ref to build (tag or branch)
        type: string
        required: false
        default: ""
      make_public:
        description: Set GHCR package visibility to public after push
        type: boolean
        required: false
        default: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build ${{ matrix.variant }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: cpu
            target: cpu
            preview_platforms: linux/amd64
            release_platforms: linux/amd64,linux/arm64
          - variant: cuda
            target: cuda
            preview_platforms: linux/amd64
            release_platforms: linux/amd64

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.ref }}

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: inputs.push
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve platforms
        id: platforms
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "value=${{ matrix.release_platforms }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ matrix.preview_platforms }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve cache scope
        id: cache
        run: |
          if [ -n "${{ inputs.pr_number }}" ]; then
            echo "scope=pr-${{ inputs.pr_number }}-${{ matrix.variant }}" >> "$GITHUB_OUTPUT"
          else
            echo "scope=${{ matrix.variant }}" >> "$GITHUB_OUTPUT"
          fi

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.version }}-${{ matrix.variant }},enable=${{ inputs.version != '' }}
            type=raw,value=latest-${{ matrix.variant }},enable=${{ inputs.publish_latest }}
            type=raw,value=pr-${{ inputs.pr_number }}-${{ matrix.variant }},enable=${{ inputs.pr_number != '' }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: ${{ matrix.target }}
          platforms: ${{ steps.platforms.outputs.value }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=${{ steps.cache.outputs.scope }}
            type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ steps.cache.outputs.scope }}

      - name: Make container package public
        if: inputs.push && inputs.make_public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method PATCH \
            "/users/${{ github.repository_owner }}/packages/container/noxa" \
            -f visibility=public \
            || true
