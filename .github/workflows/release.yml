name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build ${{ matrix.variant }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: cpu
            target: cpu
            platforms: linux/amd64,linux/arm64
          - variant: cuda
            target: cuda
            platforms: linux/amd64

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}-${{ matrix.variant }}
            type=semver,pattern={{major}}.{{minor}}-${{ matrix.variant }}
            type=raw,value=latest-${{ matrix.variant }},enable=${{ github.ref_type == 'tag' }}
            type=sha,prefix=sha-,suffix=-${{ matrix.variant }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: ${{ matrix.target }}
          platforms: ${{ matrix.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}

      - name: Make container package public
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method PATCH \
            "/users/${{ github.repository_owner }}/packages/container/noxa" \
            -f visibility=public \
            || true

  github-release:
    name: Create GitHub release
    needs: build-and-push
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Docker images

            Images are published to [GitHub Container Registry](https://github.com/${{ github.repository }}/pkgs/container/noxa) and are **public**.

            ### CPU (linux/amd64, linux/arm64)

            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}-cpu
            docker run --rm -p 8000:8000 \
              -e HF_TOKEN=hf_... \
              -v noxa-data:/data \
              ghcr.io/${{ github.repository }}:${{ github.ref_name }}-cpu
            ```

            ### CUDA (linux/amd64, requires NVIDIA Container Toolkit)

            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}-cuda
            docker run --rm --gpus all -p 8000:8000 \
              -e HF_TOKEN=hf_... \
              -v noxa-data:/data \
              ghcr.io/${{ github.repository }}:${{ github.ref_name }}-cuda
            ```

            ### Tags

            | Variant | Tags |
            |---------|------|
            | CPU | `${{ github.ref_name }}-cpu`, `latest-cpu` |
            | CUDA | `${{ github.ref_name }}-cuda`, `latest-cuda` |

            Set `NOXA_PRELOAD_MODELS=false` to skip model download on startup during smoke tests.
