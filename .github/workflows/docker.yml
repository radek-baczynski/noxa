name: Docker preview

on:
  pull_request:

concurrency:
  group: docker-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    name: Build preview images
    uses: ./.github/workflows/docker-build-reusable.yml
    with:
      push: false
      pr_number: ${{ github.event.pull_request.number }}
